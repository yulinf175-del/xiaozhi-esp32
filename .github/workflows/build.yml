
```yaml
name: Build CoreS3

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build m5stack-core-s3
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - uses: actions/checkout@v4
      - name: Build
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          python scripts/release.py m5stack-core-s3 --name m5stack-core-s3
      - uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_m5stack-core-s3
          path: build/merged-binary.bin
```
